name: 04 Merge and Close

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to merge
        required: true
        type: string
      issue_number:
        description: Optional issue number to close after merge
        required: false
        type: string

concurrency:
  group: merge-close-${{ github.workflow }}-${{ github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  merge_close:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install GitHub CLI and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Resolve target numbers
        id: target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
          INPUT_ISSUE: ${{ github.event.inputs.issue_number }}
        run: |
          echo "pr_number=${INPUT_PR}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${INPUT_ISSUE}" >> "$GITHUB_OUTPUT"
          pr_number="$(awk -F= '$1=="pr_number"{print $2}' "$GITHUB_OUTPUT" | tail -n1)"
          if [[ -z "${pr_number}" ]] || [[ ! "${pr_number}" =~ ^[0-9]+$ ]]; then
            echo "Failed to resolve numeric PR number."
            exit 1
          fi

      - name: Ensure checks passed, then merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        run: |
          checks_state="$(gh pr view "${PR_NUMBER}" --json statusCheckRollup -q '
            if (.statusCheckRollup | length) == 0 then "pending"
            elif any(.statusCheckRollup[]; (.conclusion == "FAILURE") or (.conclusion == "CANCELLED") or (.conclusion == "TIMED_OUT") or (.conclusion == "ACTION_REQUIRED") or (.state == "FAILURE") or (.state == "ERROR") or (.state == "PENDING")) then "not_green"
            else "green" end
          ')"
          if [[ "${checks_state}" != "green" ]]; then
            echo "Refusing merge: status checks are not fully green (${checks_state})."
            exit 1
          fi
          gh pr merge "${PR_NUMBER}" --squash --auto=false --delete-branch

      - name: Close linked issue (optional)
        if: steps.target.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.target.outputs.issue_number }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body "Closed after merging #${PR_NUMBER}."
          gh issue close "${ISSUE_NUMBER}"
