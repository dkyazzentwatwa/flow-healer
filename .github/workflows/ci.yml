name: CI

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "README.*"
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "README.*"
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(github.event_name == 'pull_request' && '["3.11", "3.12"]' || '["3.11", "3.12", "3.13"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -q

  node-next-tests:
    name: node-next-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e-apps/node-next/package.json

      - name: Install node-next dependencies
        working-directory: e2e-apps/node-next
        run: npm install

      - name: Run node-next tests
        working-directory: e2e-apps/node-next
        run: npm test

  prosper-chat-tests:
    name: prosper-chat-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e-apps/prosper-chat/package-lock.json

      - name: Install prosper-chat dependencies
        working-directory: e2e-apps/prosper-chat
        run: npm ci

      - name: Run prosper-chat tests
        working-directory: e2e-apps/prosper-chat
        run: npm test

  reliability-canary:
    name: reliability-canary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run reliability canary benchmark pack
        run: |
          python scripts/run_reliability_canary.py --output reliability-canary-report.json

      - name: Evaluate reliability canary gate
        run: |
          MODE="enforce"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MODE="report"
          fi
          python scripts/evaluate_reliability_canary_gate.py \
            --report reliability-canary-report.json \
            --policy .github/reliability-canary-policy.json \
            --mode "${MODE}" \
            --summary-output reliability-canary-summary.md

      - name: Upload reliability canary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reliability-canary
          path: |
            reliability-canary-report.json
            reliability-canary-summary.md

  package:
    name: package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built wheel in a clean virtualenv
        run: |
          python -m venv .venv-package
          .venv-package/bin/python -m pip install --upgrade pip
          .venv-package/bin/python -m pip install dist/*.whl

      - name: Verify CLI entrypoint
        run: .venv-package/bin/flow-healer --help
