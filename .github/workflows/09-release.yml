name: 09 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-python:
    name: build-python
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Extract version
        id: meta
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(f"version={data['project']['version']}")
          PY

      - name: Upload python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  verify-wheel:
    name: verify-wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-python

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify wheel install
        run: |
          python -m venv .venv-release
          .venv-release/bin/python -m pip install --upgrade pip
          .venv-release/bin/python -m pip install dist/*.whl
          .venv-release/bin/flow-healer --help

  build-dashboard:
    name: build-dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build

  create-release:
    name: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-python
      - verify-wheel
      - build-dashboard

    steps:
      - name: Download python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
