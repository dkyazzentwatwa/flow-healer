name: 06 Dependency Review

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "e2e-apps/**/package.json"
      - "e2e-apps/**/package-lock.json"
      - "e2e-smoke/**/package.json"
      - "e2e-smoke/**/package-lock.json"
      - ".github/workflows/**"

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, AGPL-1.0, AGPL-3.0
          comment-summary-in-pr: always
        continue-on-error: true
