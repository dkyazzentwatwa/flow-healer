name: Healer Python Data/ML Job
description: Create a healer-ready Python data/ML issue with explicit outputs and validation.
title: "Python data/ml task: "
labels:
  - healer:ready
  - agent:codex
  - difficulty:medium
body:
  - type: dropdown
    id: framework
    attributes:
      label: Profile
      options:
        - pandas
        - sklearn
    validations:
      required: true
  - type: textarea
    id: required_outputs
    attributes:
      label: Required code outputs
      description: List the exact files Flow Healer may edit for this task.
      placeholder: |
        - e2e-smoke/py-data-pandas/app/add.py
        - e2e-smoke/py-data-pandas/tests/test_add.py
    validations:
      required: true
  - type: textarea
    id: execution_root
    attributes:
      label: Execution root
      description: Optional when the outputs and validation already point to one workspace; fill this in when the repo has multiple candidate roots.
      placeholder: |
        - e2e-smoke/py-data-pandas
    validations:
      required: false
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Include the exact command Flow Healer should use to prove the fix.
      placeholder: |
        - cd e2e-smoke/py-data-pandas && pytest -q
    validations:
      required: true
