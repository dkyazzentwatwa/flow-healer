name: Healer JS Framework Job
description: Create a healer-ready JS framework issue with explicit outputs and validation.
title: "JS framework task: "
labels:
  - healer:ready
  - agent:codex
  - difficulty:medium
body:
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - next
        - vue-vite
        - nuxt
        - angular
        - sveltekit
        - express
        - nest
    validations:
      required: true
  - type: textarea
    id: required_outputs
    attributes:
      label: Required code outputs
      description: List the exact files Flow Healer may edit for this task.
      placeholder: |
        - e2e-smoke/js-next/src/add.js
        - e2e-smoke/js-next/tests/add.test.js
    validations:
      required: true
  - type: textarea
    id: execution_root
    attributes:
      label: Execution root
      description: Optional when the outputs and validation already point to one workspace; fill this in when the repo has multiple candidate roots.
      placeholder: |
        - e2e-smoke/js-next
    validations:
      required: false
  - type: textarea
    id: validation
    attributes:
      label: Validation commands
      description: Include the exact command Flow Healer should use to prove the fix.
      placeholder: |
        - cd e2e-smoke/js-next && npm test -- --passWithNoTests
    validations:
      required: true
